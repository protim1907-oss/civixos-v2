<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Civix250 — Eagle Ad Creative</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #d1d5db;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  .ad {
    width: 960px;
    background: #ffffff;
    display: block;
    overflow: hidden;
    text-decoration: none;
    box-shadow: 0 8px 30px rgba(0,0,0,0.18);
    border-radius: 6px;
  }
  .ad img {
    width: 100%;
    display: block;
  }
  .bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: #0f172a;
    padding: 16px 24px;
    border-top: 4px solid #b91c1c;
  }
  .cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: #b91c1c;
    color: #ffffff;
    padding: 11px 28px;
    border-radius: 30px;
    white-space: nowrap;
  }
  .cta .label { font-size: 21px; font-weight: 700; letter-spacing: 0.2px; }
  .cta .arrow { font-size: 18px; }
  .bar .url { color: #cbd5e1; font-size: 17px; font-weight: 500; white-space: nowrap; }
</style>
</head>
<body>
  <a class="ad" href="https://civix250.ai/signup" target="_blank" rel="noopener noreferrer">
    <img src="/eagle-ad.jpeg" alt="Civix250 — Tired of Supreme Court decisions which empower big donors at the expense of ordinary citizens. Go to civix250.ai">
    <div class="bar">
      <span class="cta">
        <span class="label">Sign Up Free</span>
        <span class="arrow" aria-hidden="true">↗</span>
      </span>
      <span class="url">civix250.ai/signup</span>
    </div>
  </a>
</body>
</html>
