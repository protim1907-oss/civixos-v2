<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Civix250 — Join</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#d1d5db; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; font-family:-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif; }
  .ad { width:720px; max-width:100%; background:#fff; display:block; overflow:hidden; text-decoration:none; border-radius:8px; box-shadow:0 8px 30px rgba(0,0,0,.18); }
  .media { position:relative; }
  .media img { width:100%; display:block; }
  .headline {
    position:absolute; top:0; left:0; right:0; height:25.5%;
    background:#ffffff;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:0 24px;
    border-bottom:2px solid #d4a537;
  }
  .headline .h1 { color:#0f172a; font-size:25px; font-weight:800; line-height:1.14; }
  .headline .h2 { color:#334155; font-size:16px; font-weight:500; margin-top:6px; }
  .headline .h2 b { color:#b91c1c; font-weight:700; }
  .bar { display:flex; align-items:center; justify-content:center; gap:14px; background:#0f172a; padding:16px 20px; border-top:4px solid #b91c1c; flex-wrap:wrap; }
  .cta { display:inline-flex; align-items:center; gap:9px; background:#b91c1c; color:#fff; padding:11px 28px; border-radius:30px; white-space:nowrap; }
  .cta .label { font-size:20px; font-weight:700; }
  .cta .arrow { font-size:17px; }
  .bar .url { color:#cbd5e1; font-size:16px; font-weight:500; white-space:nowrap; }
</style>
</head>
<body>
  <a class="ad" href="https://civix250.ai/signup" target="_blank" rel="noopener noreferrer">
    <div class="media">
      <img src="/eagle-ad.jpeg" alt="Bald eagle over the U.S. flag and the Constitution">
      <div class="headline">
        <div class="h1">Democracy works better when you show up.</div>
        <div class="h2"><b>Join Civix250 today.</b></div>
      </div>
    </div>
    <div class="bar">
      <span class="cta"><span class="label">Sign Up Free</span><span class="arrow" aria-hidden="true">↗</span></span>
      <span class="url">civix250.ai/signup</span>
    </div>
  </a>
</body>
</html>
